api:
  url: "${SIEM_AGENT_API_URL:-http://backend-api:8000/ingest}"
  api_key: "${SIEM_AGENT_API_KEY:-siem-lab-agent-key}"
  signing_secret: "${SIEM_AGENT_SIGNING_SECRET:-siem-lab-agent-secret}"
  key_version: 1
  verify_tls: false
  timeout_seconds: 8

buffer:
  max_lines_per_batch: 200
  flush_interval_seconds: 2
  max_spool_items: 50000
  spool_file: "/tmp/agent-spool.ndjson"

retry:
  base_seconds: 1
  max_seconds: 30
  max_attempts: 0

tail:
  poll_interval_seconds: 0.5
  state_file: "/tmp/agent-state.json"

agent_id: "${SIEM_AGENT_ID:-lab-agent}"

sources:
  - source_type: "ssh"
    path: "/logs/auth.log"
    start_at_end: true
  - source_type: "nginx"
    path: "/logs/nginx/access.log"
    start_at_end: true
  - source_type: "firewall"
    path: "/logs/firewall.log"
    start_at_end: true
