<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340">
  <defs>
    <style>
      .bg { fill: #101720; }
      .box { fill: #162533; stroke: #5eead4; stroke-width: 2; rx: 14; ry: 14; }
      .state { fill: #1d2430; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
      .title { fill: #effdfb; font: 18px 'IBM Plex Sans', sans-serif; font-weight: 600; }
      .label { fill: #d3e9ee; font: 12px 'IBM Plex Sans', sans-serif; }
      .line { stroke: #d3e9ee; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d3e9ee"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="340"/>

  <rect class="box" x="30" y="110" width="150" height="110"/>
  <text class="title" x="70" y="148">Event</text>
  <text class="label" x="48" y="176">normalized + enriched</text>
  <text class="label" x="48" y="196">parser_status checked</text>

  <rect class="box" x="220" y="110" width="170" height="110"/>
  <text class="title" x="246" y="148">Suppression</text>
  <text class="label" x="238" y="176">allowlist / suppression</text>
  <text class="label" x="238" y="196">skip alert, keep event</text>

  <rect class="box" x="430" y="110" width="170" height="110"/>
  <text class="title" x="452" y="148">Built-in Rules</text>
  <text class="label" x="448" y="176">SSH, auth anomaly, port scan</text>
  <text class="label" x="448" y="196">stateful windows + dedupe</text>

  <rect class="state" x="640" y="40" width="190" height="110"/>
  <text class="title" x="686" y="78">Redis State</text>
  <text class="label" x="658" y="106">count windows</text>
  <text class="label" x="658" y="126">distinct windows</text>

  <rect class="box" x="640" y="190" width="190" height="110"/>
  <text class="title" x="670" y="228">YAML Rules</text>
  <text class="label" x="658" y="256">compiled matchers</text>
  <text class="label" x="658" y="276">threshold + time window</text>

  <rect class="box" x="870" y="110" width="170" height="110"/>
  <text class="title" x="889" y="148">Correlation</text>
  <text class="label" x="888" y="176">sequence matching</text>
  <text class="label" x="888" y="196">source_ip grouped history</text>

  <rect class="box" x="1080" y="110" width="170" height="110"/>
  <text class="title" x="1124" y="148">Alert</text>
  <text class="label" x="1098" y="176">persist + integrity chain</text>
  <text class="label" x="1098" y="196">publish + enqueue delivery</text>

  <line class="line" x1="180" y1="165" x2="220" y2="165"/>
  <line class="line" x1="390" y1="165" x2="430" y2="165"/>
  <line class="line" x1="600" y1="165" x2="640" y2="95"/>
  <line class="line" x1="600" y1="165" x2="640" y2="245"/>
  <line class="line" x1="830" y1="95" x2="870" y2="165"/>
  <line class="line" x1="830" y1="245" x2="870" y2="165"/>
  <line class="line" x1="1040" y1="165" x2="1080" y2="165"/>
</svg>
