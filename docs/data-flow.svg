<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
  <defs>
    <style>
      .bg { fill: #0c1520; }
      .box { fill: #122233; stroke: #60a5fa; stroke-width: 2; rx: 14; ry: 14; }
      .proc { fill: #132a2d; stroke: #5eead4; stroke-width: 2; rx: 14; ry: 14; }
      .store { fill: #2a1f1a; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
      .title { fill: #eefcff; font: 18px 'IBM Plex Sans', sans-serif; font-weight: 600; }
      .label { fill: #d2ebf1; font: 12px 'IBM Plex Sans', sans-serif; }
      .line { stroke: #d2ebf1; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d2ebf1"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="360"/>

  <rect class="box" x="30" y="110" width="150" height="110"/>
  <text class="title" x="68" y="148">Raw Log</text>
  <text class="label" x="48" y="176">SSH / HTTP / firewall</text>
  <text class="label" x="48" y="196">one line at a time</text>

  <rect class="proc" x="220" y="110" width="180" height="110"/>
  <text class="title" x="272" y="148">Ingest API</text>
  <text class="label" x="238" y="176">auth, replay, rate limit</text>
  <text class="label" x="238" y="196">append to stream only</text>

  <rect class="box" x="440" y="110" width="170" height="110"/>
  <text class="title" x="463" y="148">Redis Stream</text>
  <text class="label" x="458" y="176">siem:ingest</text>
  <text class="label" x="458" y="196">raw payload + agent metadata</text>

  <rect class="proc" x="650" y="40" width="170" height="90"/>
  <text class="title" x="684" y="76">Normalize</text>
  <text class="label" x="668" y="102">typed event or parse failure</text>

  <rect class="proc" x="650" y="150" width="170" height="90"/>
  <text class="title" x="685" y="186">Enrich</text>
  <text class="label" x="664" y="212">GeoIP, ASN, asset, identity</text>

  <rect class="store" x="860" y="110" width="170" height="110"/>
  <text class="title" x="909" y="148">Event Store</text>
  <text class="label" x="878" y="176">payload + enrichment + hash</text>
  <text class="label" x="878" y="196">parser failures kept</text>

  <rect class="proc" x="1070" y="40" width="170" height="90"/>
  <text class="title" x="1093" y="76">Detection</text>
  <text class="label" x="1088" y="102">built-ins + YAML rules</text>

  <rect class="proc" x="1070" y="150" width="170" height="90"/>
  <text class="title" x="1086" y="186">Correlation</text>
  <text class="label" x="1085" y="212">ordered alert sequences</text>

  <rect class="store" x="1280" y="110" width="90" height="110"/>
  <text class="title" x="1298" y="148">Alerts</text>
  <text class="label" x="1290" y="176">DB + alert stream</text>

  <line class="line" x1="180" y1="165" x2="220" y2="165"/>
  <line class="line" x1="400" y1="165" x2="440" y2="165"/>
  <line class="line" x1="610" y1="165" x2="650" y2="85"/>
  <line class="line" x1="735" y1="130" x2="735" y2="150"/>
  <line class="line" x1="820" y1="195" x2="860" y2="165"/>
  <line class="line" x1="1030" y1="165" x2="1070" y2="85"/>
  <line class="line" x1="1155" y1="130" x2="1155" y2="150"/>
  <line class="line" x1="1240" y1="195" x2="1280" y2="165"/>
</svg>
