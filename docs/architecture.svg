<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
  <defs>
    <style>
      .bg { fill: #0a1720; }
      .box { fill: #102634; stroke: #5eead4; stroke-width: 2; rx: 16; ry: 16; }
      .store { fill: #1a2736; stroke: #f59e0b; stroke-width: 2; rx: 16; ry: 16; }
      .redis { fill: #152334; stroke: #7dd3fc; stroke-width: 2; rx: 16; ry: 16; }
      .ui { fill: #1a2230; stroke: #fca5a5; stroke-width: 2; rx: 16; ry: 16; }
      .title { fill: #e6fffb; font: 20px 'IBM Plex Sans', sans-serif; font-weight: 600; }
      .label { fill: #c8e6ea; font: 13px 'IBM Plex Sans', sans-serif; }
      .note { fill: #9ab5bc; font: 12px 'IBM Plex Sans', sans-serif; }
      .warn { fill: #fbbf24; font: 12px 'IBM Plex Sans', sans-serif; }
      .line { stroke: #5eead4; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #7dd3fc; stroke-width: 2.5; fill: none; marker-end: url(#arrowBlue); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5eead4"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="620"/>

  <rect class="box" x="40" y="90" width="190" height="130"/>
  <text class="title" x="95" y="128">Agent</text>
  <text class="label" x="58" y="156">Tail + offset tracking</text>
  <text class="label" x="58" y="176">Disk spool + retry</text>
  <text class="label" x="58" y="196">HMAC-signed ingest</text>

  <rect class="box" x="280" y="90" width="220" height="130"/>
  <text class="title" x="338" y="128">FastAPI Ingest</text>
  <text class="label" x="300" y="156">Agent API key validation</text>
  <text class="label" x="300" y="176">Nonce + replay checks</text>
  <text class="label" x="300" y="196">Rate limit + audit logging</text>

  <rect class="redis" x="560" y="40" width="240" height="140"/>
  <text class="title" x="610" y="78">Redis DB 0</text>
  <text class="label" x="580" y="108">Streams only</text>
  <text class="label" x="580" y="128">siem:ingest</text>
  <text class="label" x="580" y="148">siem:alerts</text>

  <rect class="redis" x="560" y="220" width="240" height="140"/>
  <text class="title" x="610" y="258">Redis DB 1</text>
  <text class="label" x="580" y="288">Pub/Sub only</text>
  <text class="label" x="580" y="308">siem:live</text>
  <text class="note" x="580" y="330">Non-durable live feed</text>

  <rect class="redis" x="560" y="400" width="240" height="160"/>
  <text class="title" x="610" y="438">Redis DB 2</text>
  <text class="label" x="580" y="468">State + retry metadata</text>
  <text class="label" x="580" y="488">Counters, dedupe, nonce, rate limit</text>
  <text class="label" x="580" y="508">XPENDING + retry counters</text>
  <text class="warn" x="580" y="532">Loss resets detection state</text>

  <rect class="box" x="860" y="70" width="240" height="160"/>
  <text class="title" x="900" y="108">Backend Worker</text>
  <text class="label" x="880" y="138">XREADGROUP + XAUTOCLAIM</text>
  <text class="label" x="880" y="158">Normalize + enrich</text>
  <text class="label" x="880" y="178">Detect + correlate</text>
  <text class="label" x="880" y="198">Dead-letter after retry limit</text>

  <rect class="store" x="1160" y="70" width="190" height="180"/>
  <text class="title" x="1195" y="108">PostgreSQL</text>
  <text class="label" x="1180" y="138">events</text>
  <text class="label" x="1180" y="158">alerts</text>
  <text class="label" x="1180" y="178">ingest_audit</text>
  <text class="label" x="1180" y="198">integrity_chain</text>
  <text class="note" x="1180" y="222">Monthly partitions</text>

  <rect class="box" x="860" y="320" width="240" height="150"/>
  <text class="title" x="916" y="358">Alert Worker</text>
  <text class="label" x="880" y="388">Consumes siem:alerts</text>
  <text class="label" x="880" y="408">SMTP + webhook delivery</text>
  <text class="label" x="880" y="428">Dispatch dedupe by alert id</text>

  <rect class="ui" x="1160" y="320" width="190" height="110"/>
  <text class="title" x="1205" y="358">Dashboard</text>
  <text class="label" x="1180" y="388">HTTP bootstrap</text>
  <text class="label" x="1180" y="408">WebSocket live feed</text>

  <rect class="redis" x="860" y="500" width="240" height="80"/>
  <text class="title" x="922" y="540">Dead Letter Stream</text>
  <text class="label" x="880" y="562">Original payload + error metadata</text>

  <line class="line" x1="230" y1="155" x2="280" y2="155"/>
  <line class="line" x1="500" y1="155" x2="560" y2="110"/>
  <line class="line" x1="800" y1="110" x2="860" y2="150"/>
  <line class="line" x1="1100" y1="150" x2="1160" y2="150"/>
  <line class="line" x1="980" y1="230" x2="980" y2="320"/>
  <line class="line" x1="1100" y1="375" x2="1160" y2="375"/>
  <line class="line2" x1="800" y1="290" x2="1160" y2="375"/>
  <line class="line" x1="800" y1="480" x2="860" y2="520"/>
  <line class="line2" x1="980" y1="230" x2="680" y2="400"/>

  <text class="note" x="820" y="290">Live publish</text>
  <text class="note" x="700" y="388">State, retry, dedupe</text>
</svg>
