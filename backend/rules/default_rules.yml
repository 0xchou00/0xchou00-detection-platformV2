rules:
  - id: ssh_invalid_user_burst
    title: Invalid SSH user burst
    description: Repeated SSH failures against invalid usernames from the same source.
    severity: high
    source_type: ssh
    event_type: authentication_failure
    match:
      raw_message:
        contains: "invalid user"
    aggregation:
      group_by: source_ip
      window_seconds: 120
      threshold: 4
      function: count

  - id: web_sensitive_probe
    title: Sensitive HTTP path probing
    description: Sensitive paths hit multiple times from the same source within 2 minutes.
    severity: high
    source_type: nginx
    event_type: http_request
    match:
      path:
        regex: "^(/\\.env|/phpmyadmin|/wp-login\\.php|/admin|/\\.git/config)$"
    aggregation:
      group_by: source_ip
      window_seconds: 120
      threshold: 3
      function: count

  - id: firewall_multiport_probe
    title: Multi-port network probe
    description: Distinct destination port probing in a tight window.
    severity: high
    source_type: firewall
    event_type: network_connection_attempt
    match:
      protocol:
        regex: "^(TCP|UDP)$"
    aggregation:
      group_by: source_ip
      window_seconds: 60
      threshold: 6
      function: distinct_count
      field: destination_port

  - id: sigma_ssh_success_after_failures
    title: Sigma style SSH success after failures
    description: Sigma-like subset rule that tracks successful login after suspicious activity.
    severity: critical
    sigma:
      logsource:
        product: ssh
      detection:
        selection:
          event_type: authentication_success
          source_type: ssh
        condition: selection
    aggregation:
      group_by: source_ip
      window_seconds: 300
      threshold: 1
      function: count
