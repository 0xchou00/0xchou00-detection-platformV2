rules:
  - id: scan_to_bruteforce_to_success
    title: Attack chain scan -> brute force -> success
    description: Source performed multi-port scan, then SSH brute force, then obtained SSH success.
    severity: critical
    window_seconds: 900
    group_by: source_ip
    sequence:
      - detector: port_scan
      - detector: brute_force
      - detector: session_state

  - id: web_probe_to_sensitive_rule
    title: Web probing chain escalated
    description: Repeated sensitive probing patterns matched by YAML rule and then escalated by correlation.
    severity: high
    window_seconds: 600
    group_by: source_ip
    sequence:
      - detector: yaml_rules
        rule_id: web_sensitive_probe
      - detector: yaml_rules
        rule_id: web_sensitive_probe
